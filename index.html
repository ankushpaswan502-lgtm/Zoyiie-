<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoyiie Messenger - Professional</title>
  <style>
    :root {
      --bg-color: #0b141a;
      --panel-bg: #111b21;
      --header-bg: #202c33;
      --input-bg: #2a3942;
      --text-primary: #e9edef;
      --text-secondary: #8696a0;
      --accent-green: #00a884;
      --accent-hover: #005c4b;
      --danger: #ef4444;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body { 
      background: #080c10; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      color: var(--text-primary); 
    }

    .app-container { 
      width: 100%; 
      max-width: 480px; 
      height: 100vh; 
      max-height: 920px;
      background: var(--bg-color); 
      border-radius: 20px; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
      border: 1px solid var(--border-color); 
      position: relative; 
    }

    .screen { display: none; flex: 1; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg-color); }
    .screen.active { display: flex !important; }

    .app-header { 
      background: var(--header-bg); 
      color: var(--text-primary); 
      padding: 14px 18px; 
      font-size: 1.1rem; 
      font-weight: 600; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-bottom: 1px solid var(--border-color);
      min-height: 60px;
    }

    /* LOGIN SCREEN */
    #login-screen {
      justify-content: center;
      align-items: center;
      padding: 30px;
      text-align: center;
      background: var(--bg-color);
    }

    .login-logo {
      font-size: 42px;
      color: var(--accent-green);
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -1px;
    }

    .form-group {
      width: 100%;
      margin-bottom: 16px;
      text-align: left;
    }

    .app-input { 
      width: 100%; 
      padding: 14px 16px; 
      border: 1px solid var(--border-color); 
      border-radius: 12px; 
      font-size: 15px; 
      background: var(--input-bg); 
      color: var(--text-primary); 
      outline: none; 
      transition: border 0.3s;
    }

    .app-input:focus { border-color: var(--accent-green); }

    .app-btn { 
      width: 100%; 
      padding: 14px; 
      background: var(--accent-green); 
      color: #0b141a; 
      border: none; 
      border-radius: 12px; 
      font-weight: 700; 
      font-size: 15px; 
      cursor: pointer; 
      margin-top: 10px;
    }

    .content-body { flex: 1; overflow-y: auto; padding: 12px; }

    .card-item { 
      background: var(--panel-bg); 
      padding: 12px 16px; 
      border-radius: 14px; 
      margin-bottom: 8px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      border: 1px solid var(--border-color); 
      cursor: pointer;
    }

    .card-title { font-weight: 600; color: var(--text-primary); font-size: 15px; }
    .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

    #chat-box { 
      flex: 1; 
      overflow-y: auto; 
      padding: 16px; 
      background-color: #080c10; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }

    .msg-card { 
      max-width: 80%; 
      padding: 10px 14px; 
      border-radius: 12px; 
      font-size: 14px; 
      word-wrap: break-word; 
      line-height: 1.4;
    }
    .msg-card.sent { background: #005c4b; color: var(--text-primary); align-self: flex-end; border-top-right-radius: 2px; }
    .msg-card.received { background: var(--panel-bg); color: var(--text-primary); align-self: flex-start; border-top-left-radius: 2px; border: 1px solid var(--border-color); }

    .chat-input-area { 
      padding: 12px; 
      background: var(--header-bg); 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      border-top: 1px solid var(--border-color); 
    }

    .nav-bar { display: flex; background: var(--header-bg); border-top: 1px solid var(--border-color); }
    .nav-tab { flex: 1; text-align: center; padding: 14px; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; }
    .nav-tab.active { color: var(--accent-green); background: rgba(0,168,132,0.05); border-bottom: 3px solid var(--accent-green); }

    .action-icon { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; color: var(--text-primary); }
    .top-action-btn { background: none; border: none; color: #38bdf8; font-size: 13px; cursor: pointer; font-weight: 600; }

    /* STATUS STORY VIEWER MODAL */
    #story-modal {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="app-container">

  <!-- 1. LOGIN SCREEN -->
  <div id="login-screen" class="screen">
    <div class="login-logo">Zoyiie</div>
    <p style="color:var(--text-secondary); font-size: 13px; margin-bottom: 30px;">Messaging Platform</p>
    
    <div class="form-group">
      <input type="text" id="user-name" class="app-input" placeholder="Rahul">
    </div>

    <div class="form-group">
      <input type="tel" id="user-phone" class="app-input" placeholder="6230553997">
    </div>

    <button type="button" class="app-btn" onclick="loginUser()">Continue</button>
  </div>

  <!-- 2. CHATS TAB -->
  <div id="contacts-screen" class="screen">
    <div class="app-header">
      <span>Zoyiie Chats</span>
      <span id="my-profile-name" style="font-size: 12px; color: var(--accent-green); background: rgba(0,168,132,0.1); padding: 4px 10px; border-radius: 20px;"></span>
    </div>
    <div class="content-body">
      <div style="background: var(--panel-bg); padding: 14px; border-radius: 16px; margin-bottom: 16px; border: 1px solid var(--border-color);">
        <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:6px;">Start new conversation</label>
        <div style="display: flex; gap: 8px;">
          <input type="tel" id="new-chat-phone" class="app-input" placeholder="Recipient phone..." style="margin:0;">
          <button class="app-btn" onclick="startNewChat()" style="width: 100px; margin:0; padding:0;">Chat</button>
        </div>
      </div>
      <div style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; font-weight: 600;">Recent Contacts</div>
      <div id="recent-users-list"></div>
    </div>
  </div>

  <!-- 3. STATUS TAB -->
  <div id="status-screen" class="screen">
    <div class="app-header">
      <span>Status Updates</span>
      <label style="background: var(--accent-green); color: #0b141a; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;">
        + Add Status <input type="file" id="status-file-input" accept="image/*" style="display:none;" onchange="uploadStatusImage(event)">
      </label>
    </div>
    <div class="content-body" id="status-list"></div>
  </div>

  <!-- 4. CHAT ROOM -->
  <div id="chat-screen" class="screen">
    <div class="app-header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <button class="top-action-btn" onclick="switchMainTab('contacts-screen')">← Back</button>
        <span id="chat-with-title" style="font-size: 15px;">Chat</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <button class="action-icon" onclick="startVideoCall()" title="Video Call">📹</button>
        <button class="top-action-btn" onclick="clearFullChat()" style="color: var(--danger);">Clear</button>
      </div>
    </div>
    <div id="chat-box"></div>
    <div class="chat-input-area">
      <input type="text" id="message-input" class="app-input" placeholder="Type a message..." style="margin:0;">
      <button class="app-btn" onclick="sendTextMessage()" style="width: auto; padding: 12px 20px; margin:0;">Send</button>
    </div>
  </div>

  <!-- 5. VIDEO CALL SCREEN -->
  <div id="call-screen" class="screen" style="background:#000;">
    <div class="app-header">
      <span style="font-size: 14px;">Zoyiie Secure Call</span>
      <button onclick="endVideoCall()" style="background: var(--danger); color: #fff; border:none; padding: 6px 14px; border-radius: 8px; font-weight:600; cursor:pointer;">End Call</button>
    </div>
    <div id="call-frame-container" style="flex:1; width:100%; height:100%;"></div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <div id="bottom-nav" class="nav-bar" style="display: none;">
    <div class="nav-tab active" id="tab-chats" onclick="switchMainTab('contacts-screen')">Chats</div>
    <div class="nav-tab" id="tab-status" onclick="switchMainTab('status-screen')">Status</div>
  </div>

  <!-- STATUS STORY VIEWER MODAL WITH VIEWER LIST & DELETE -->
  <div id="story-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; color:#fff;">
      <div>
        <h4 id="story-owner-name" style="font-size:15px;"></h4>
        <span id="story-time" style="font-size:11px; color:var(--text-secondary);"></span>
      </div>
      <div style="position:relative;">
        <button id="story-menu-btn" onclick="toggleStoryMenu()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer; display:none; padding:4px 8px;">⋮</button>
        <div id="story-dropdown" style="display:none; position:absolute; right:0; top:30px; background:var(--panel-bg); border:1px solid var(--border-color); border-radius:8px; overflow:hidden; width:110px; z-index:10;">
          <button onclick="deleteCurrentStatus()" style="width:100%; padding:10px; background:none; border:none; color:var(--danger); font-size:13px; font-weight:600; cursor:pointer; text-align:left;">Delete</button>
        </div>
      </div>
    </div>
    
    <div style="flex:1; display:flex; justify-content:center; align-items:center; margin:10px 0;">
      <img id="story-image-preview" src="" style="max-width:100%; max-height:60vh; object-fit:contain; border-radius:8px;" />
    </div>

    <!-- Viewer Analytics Section -->
    <div style="background:var(--panel-bg); padding:10px 14px; border-radius:10px; max-height:120px; overflow-y:auto; border:1px solid var(--border-color);">
      <div style="font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px;">Viewers Analytics</div>
      <div id="story-viewers-list" style="font-size:12px; color:var(--text-primary); display:flex; flex-direction:column; gap:4px;"></div>
    </div>

    <button onclick="closeStoryModal()" style="margin-top:10px; padding:10px; background:var(--input-bg); color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Close</button>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyATlUhTYmH8_CUYuSGk5pncjSG6KfExU5M",
    authDomain: "zoya-52da9.firebaseapp.com",
    projectId: "zoya-52da9",
    storageBucket: "zoya-52da9.firebasestorage.app",
    messagingSenderId: "418386323111",
    appId: "1:418386323111:web:b28274468940415f9bdd82"
  };

  let db = null;
  try {
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    db = firebase.firestore();
  } catch(e) { console.error(e); }

  let currentUser = { name: "", phone: "" };
  let activeRoomId = "";
  let activeViewingStatusId = null;
  let activeViewingStatusOwner = "";

  // STRICT LOGIN ENFORCEMENT ON REFRESH
  window.addEventListener('DOMContentLoaded', () => {
    showLoginScreen();
  });

  function showLoginScreen() {
    localStorage.removeItem("zoyiie_user");
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("login-screen").classList.add("active");
    document.getElementById("bottom-nav").style.display = "none";
  }

  function loginUser() {
    const name = document.getElementById("user-name").value.trim();
    const phone = document.getElementById("user-phone").value.trim();

    if (!name || phone.length < 10) {
      alert("Please enter a valid name and phone number.");
      return;
    }

    currentUser = { name, phone };
    localStorage.setItem("zoyiie_user", JSON.stringify(currentUser));

    if (db) {
      db.collection("users").doc(phone).set({
        name: name,
        phone: phone,
        lastActive: Date.now()
      }).catch(err => console.log(err));
    }

    showMainApp();
  }

  function showMainApp() {
    document.getElementById("bottom-nav").style.display = "flex";
    switchMainTab('contacts-screen');
    document.getElementById("my-profile-name").innerText = currentUser.name;
  }

  function switchMainTab(screenId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(screenId).classList.add("active");
    
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    if (screenId === "contacts-screen") {
      document.getElementById("tab-chats").classList.add("active");
      loadUsers();
    } else if (screenId === "status-screen") {
      document.getElementById("tab-status").classList.add("active");
      loadStatuses();
    }
  }

  function startNewChat() {
    const targetPhone = document.getElementById("new-chat-phone").value.trim();
    if (!targetPhone || targetPhone.length < 10) {
      alert("Please enter a valid 10-digit phone number.");
      return;
    }
    if (targetPhone === currentUser.phone) {
      alert("You cannot chat with yourself.");
      return;
    }

    if (db) {
      db.collection("users").doc(targetPhone).get().then(doc => {
        let partnerName = doc.exists ? (doc.data().name || targetPhone) : targetPhone;
        openPrivateChat(partnerName, targetPhone);
      }).catch(() => openPrivateChat(targetPhone, targetPhone));
    } else {
      openPrivateChat(targetPhone, targetPhone);
    }
  }

  function loadUsers() {
    if (!db) return;
    db.collection("users").onSnapshot(snapshot => {
      const list = document.getElementById("recent-users-list");
      if (!list) return;
      list.innerHTML = "";
      
      let count = 0;
      snapshot.forEach(doc => {
        const u = doc.data();
        if (u.phone !== currentUser.phone) {
          count++;
          list.innerHTML += `
            <div class="card-item" onclick="openPrivateChat('${u.name || u.phone}', '${u.phone}')">
              <div>
                <div class="card-title">${u.name || 'User'}</div>
                <div class="card-subtitle">${u.phone}</div>
              </div>
              <span style="color:var(--accent-green); font-size:13px; font-weight:600;">Message</span>
            </div>
          `;
        }
      });
      if (count === 0) {
        list.innerHTML = `<p style="color:var(--text-secondary); font-size:13px; text-align:center; margin-top:20px;">No other users found yet.</p>`;
      }
    });
  }

  function openPrivateChat(partnerName, partnerPhone) {
    const sorted = [currentUser.phone, partnerPhone].sort();
    activeRoomId = `room_${sorted[0]}_${sorted[1]}`;
    document.getElementById("chat-with-title").innerText = partnerName;
    
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("chat-screen").classList.add("active");
    document.getElementById("bottom-nav").style.display = "none";
    loadMessages();
  }

  function startVideoCall() {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("call-screen").classList.add("active");
    document.getElementById("call-frame-container").innerHTML = `<iframe src="https://meet.jit.si/ZoyiieSecureCall_${activeRoomId}" allow="camera; microphone; fullscreen; display-capture" style="width:100%; height:100%; border:none;"></iframe>`;
  }

  function endVideoCall() {
    document.getElementById("call-frame-container").innerHTML = "";
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("chat-screen").classList.add("active");
  }

  function loadMessages() {
    if (!db || !activeRoomId) return;
    db.collection("rooms").doc(activeRoomId).collection("messages")
      .orderBy("timestamp", "asc")
      .onSnapshot(snapshot => {
        const box = document.getElementById("chat-box");
        if (!box) return;
        box.innerHTML = "";
        snapshot.forEach(doc => {
          const m = doc.data();
          const isMe = m.senderPhone === currentUser.phone;
          box.innerHTML += `<div class="msg-card ${isMe ? 'sent' : 'received'}"><div>${m.text}</div></div>`;
        });
        box.scrollTop = box.scrollHeight;
      });
  }

  function sendTextMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text || !activeRoomId || !db) return;
    db.collection("rooms").doc(activeRoomId).collection("messages").add({
      senderName: currentUser.name,
      senderPhone: currentUser.phone,
      text: text,
      timestamp: Date.now()
    }).then(() => { input.value = ""; });
  }

  function clearFullChat() {
    if (!db || !activeRoomId) return;
    if (confirm("Clear this chat?")) {
      db.collection("rooms").doc(activeRoomId).collection("messages").get()
        .then(snap => snap.forEach(d => d.ref.delete()));
    }
  }

  function uploadStatusImage(event) {
    const file = event.target.files[0];
    if (!file || !db) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      db.collection("statuses").add({
        userName: currentUser.name,
        userPhone: currentUser.phone,
        imageUrl: e.target.result,
        createdAt: Date.now(),
        viewers: []
      }).then(() => loadStatuses());
    };
    reader.readAsDataURL(file);
  }

  function loadStatuses() {
    if (!db) return;
    db.collection("statuses").orderBy("createdAt", "desc").onSnapshot(snapshot => {
      const statusList = document.getElementById("status-list");
      if (!statusList) return;
      statusList.innerHTML = "";

      if (snapshot.empty) {
        statusList.innerHTML = `<p style="color:var(--text-secondary); text-align:center; margin-top:20px;">No status updates available.</p>`;
        return;
      }

      snapshot.forEach(doc => {
        const s = doc.data();
        const statusId = doc.id;
        const timeAgo = Math.floor((Date.now() - s.createdAt) / 60000);
        
        statusList.innerHTML += `
          <div class="card-item" onclick="openStoryViewer('${statusId}', '${s.userName}', '${s.userPhone}', '${s.imageUrl}', ${s.createdAt}, '${encodeURIComponent(JSON.stringify(s.viewers || []))}')" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <div style="display:flex; justify-content:space-between; width:100%;">
              <span class="card-title">${s.userName}</span>
              <span style="color:var(--text-secondary); font-size:11px;">${timeAgo < 1 ? 'Just now' : timeAgo + 'm ago'}</span>
            </div>
            <img src="${s.imageUrl}" style="width:100%; max-height:220px; object-fit:cover; border-radius:10px;" />
            <div style="font-size:11px; color:var(--text-secondary);">Tap to view & analytics (${(s.viewers || []).length} views)</div>
          </div>
        `;
      });
    });
  }

  f
