<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoyiie Messenger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: #090d16; display: flex; justify-content: center; align-items: center; height: 100vh; color: #f1f5f9; }
    .app-container { width: 100%; max-width: 450px; height: 95vh; background: #0f172a; border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.08); position: relative; }
    .header { background: #1e293b; color: #f8fafc; padding: 16px 20px; font-size: 1.05rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .screen { display: none; padding: 16px; flex: 1; flex-direction: column; overflow-y: auto; }
    .screen.active { display: flex !important; }
    input[type="text"], input[type="tel"] { width: 100%; padding: 14px 18px; margin: 10px 0; border: 1px solid #334155; border-radius: 14px; font-size: 14px; background: #1e293b; color: #f8fafc; outline: none; }
    button { width: 100%; padding: 14px; background: #00e676; color: #090d16; border: none; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 10px; }
    .user-card, .status-card { background: #1e293b; padding: 14px 18px; border-radius: 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.04); }
    .u-name { font-weight: 600; color: #f8fafc; font-size: 15px; }
    #chat-box { flex: 1; overflow-y: auto; padding: 18px; background-color: #0b1120; display: flex; flex-direction: column; gap: 12px; }
    .msg-card { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14px; word-wrap: break-word; }
    .msg-card.sent { background: #005c4b; color: #f1f5f9; align-self: flex-end; }
    .msg-card.received { background: #1e293b; color: #e2e8f0; align-self: flex-start; }
    .input-area { padding: 12px; background: #1e293b; display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
    .top-btn { background: none; color: #38bdf8; border: none; font-size: 13px; cursor: pointer; width: auto; margin:0; }
    .nav-bar { display: flex; background: #1e293b; border-top: 1px solid rgba(255,255,255,0.05); }
    .nav-tab { flex: 1; text-align: center; padding: 14px; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; }
    .nav-tab.active { color: #00e676; border-top: 2px solid #00e676; background: rgba(0,230,118,0.03); }
    .action-icon-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 6px 10px; border-radius: 8px; margin: 0; width: auto; }
  </style>
</head>
<body>

<div class="app-container">

  <!-- SCREEN 1: LOGIN -->
  <div id="login-screen" class="screen active" style="justify-content: center; text-align: center;">
    <h1 style="color:#00e676; margin-bottom: 6px; font-size: 2.2rem; font-weight: 800;">Zoyiie</h1>
    <p style="color:#64748b; font-size: 13px; margin-bottom: 24px;">Secure Messaging Platform</p>
    
    <input type="text" id="user-name" placeholder="Enter Full Name">
    <input type="tel" id="user-phone" placeholder="Enter Phone Number">
    <button type="button" onclick="loginUser()">Continue to Chat</button>
  </div>

  <!-- SCREEN 2: CHATS TAB -->
  <div id="contacts-screen" class="screen">
    <div class="header" style="margin: -16px -16px 16px -16px;">
      <span>Chats</span>
      <span id="my-profile-name" style="font-size: 13px; color: #94a3b8;"></span>
    </div>

    <!-- Start New Conversation Section -->
    <div style="margin-bottom: 20px; background: #1e293b; padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.04);">
      <p style="font-size: 12px; color: #94a3b8; margin-bottom: 8px;">Start new conversation:</p>
      <input type="tel" id="new-chat-phone" placeholder="Enter Phone Number..." style="margin-bottom: 10px;">
      <button onclick="startNewChat()" style="margin: 0;">Start Chat</button>
    </div>

    <h4 style="color:#64748b; margin-bottom: 12px; font-size: 13px; text-transform: uppercase;">Recent Contacts</h4>
    <div id="recent-users-list" style="overflow-y: auto; flex:1;"></div>
  </div>

  <!-- SCREEN 3: STATUS TAB -->
  <div id="status-screen" class="screen">
    <div class="header" style="margin: -16px -16px 16px -16px;">
      <span>Status Updates</span>
      <label style="background: #00e676; color: #090d16; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;">
        + Add Status <input type="file" id="status-file-input" accept="image/*" style="display:none;" onchange="uploadStatusImage(event)">
      </label>
    </div>
    <div id="status-list" style="overflow-y: auto; flex:1;"></div>
  </div>

  <!-- SCREEN 4: PRIVATE CHAT ROOM -->
  <div id="chat-screen" class="screen" style="padding:0;">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <button class="top-btn" onclick="switchMainTab('contacts-screen')">←</button>
        <span id="chat-with-title" style="color:#f8fafc; font-size: 15px;">Chat</span>
      </div>
      <div style="display: flex; align-items: center; gap: 4px;">
        <button class="action-icon-btn" onclick="startVideoCall()" title="In-App Video Call" style="color:#38bdf8;">📹 Call</button>
        <button class="top-btn" onclick="clearFullChat()" style="color:#ef4444; font-size: 12px; margin-left: 6px;">Clear</button>
      </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="Type a message..." style="margin:0;">
      <button onclick="sendTextMessage()" style="width:auto; padding:12px 20px; margin:0;">Send</button>
    </div>
  </div>

  <!-- SCREEN 5: IN-APP VIDEO CALL SCREEN -->
  <div id="call-screen" class="screen" style="padding:0; background:#000;">
    <div style="display:flex; justify-content:space-between; padding:10px 16px; background:#1e293b; align-items:center;">
      <span style="color:#fff; font-size:14px; font-weight:650;">Zoyiie Live Call</span>
      <button onclick="endVideoCall()" style="background:#ef4444; color:#fff; width:auto; padding:6px 14px; margin:0; border-radius:8px; font-size:12px;">End Call</button>
    </div>
    <div id="call-frame-container" style="flex:1; width:100%; height:100%;"></div>
  </div>

  <!-- BOTTOM NAVIGATION BAR -->
  <div id="bottom-nav" class="nav-bar" style="display: none;">
    <div class="nav-tab active" id="tab-chats" onclick="switchMainTab('contacts-screen')">Chats</div>
    <div class="nav-tab" id="tab-status" onclick="switchMainTab('status-screen')">Status</div>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyATlUhTYmH8_CUYuSGk5pncjSG6KfExU5M",
    authDomain: "zoya-52da9.firebaseapp.com",
    projectId: "zoya-52da9",
    storageBucket: "zoya-52da9.firebasestorage.app",
    messagingSenderId: "418386323111",
    appId: "1:418386323111:web:b28274468940415f9bdd82"
  };

  let db = null;
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.firestore();
  } catch(e) {
    console.error("Firebase init error:", e);
  }

  let currentUser = { name: "", phone: "" };
  let activeRoomId = "";

  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem("zoyiie_user");
    if (saved) {
      currentUser = JSON.parse(saved);
      if (currentUser.phone) {
        showMainApp();
      }
    }
  });

  function loginUser() {
    const name = document.getElementById("user-name").value.trim();
    const phone = document.getElementById("user-phone").value.trim();

    if (!name || phone.length < 10) {
      alert("Please enter a valid name and phone number (min 10 digits).");
      return;
    }

    currentUser = { name, phone };
    localStorage.setItem("zoyiie_user", JSON.stringify(currentUser));

    if (db) {
      db.collection("users").doc(phone).set({
        name: name,
        phone: phone,
        lastActive: Date.now()
      }).catch(err => console.log("DB sync note:", err));
    }

    showMainApp();
  }

  function showMainApp() {
    document.getElementById("bottom-nav").style.display = "flex";
    switchMainTab('contacts-screen');
    document.getElementById("my-profile-name").innerText = currentUser.name;
  }

  function switchMainTab(screenId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(screenId).classList.add("active");
    
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    if (screenId === "contacts-screen") {
      document.getElementById("tab-chats").classList.add("active");
      loadUsers();
    } else if (screenId === "status-screen") {
      document.getElementById("tab-status").classList.add("active");
      loadStatuses();
    }
  }

  function startNewChat() {
    const targetPhone = document.getElementById("new-chat-phone").value.trim();
    if (!targetPhone || targetPhone.length < 10) {
      alert("Please enter a valid 10-digit phone number.");
      return;
    }
    if (targetPhone === currentUser.phone) {
      alert("You cannot chat with yourself.");
      return;
    }

    if (db) {
      db.collection("users").doc(targetPhone).get().then(doc => {
        let partnerName = targetPhone;
        if (doc.exists) {
          partnerName = doc.data().name || targetPhone;
        }
        openPrivateChat(partnerName, targetPhone);
      }).catch(() => {
        openPrivateChat(targetPhone, targetPhone);
      });
    } else {
      openPrivateChat(targetPhone, targetPhone);
    }
  }

  function loadUsers() {
    if (!db) return;
    db.collection("users").onSnapshot(snapshot => {
      const list = document.getElementById("recent-users-list");
      if (!list) return;
      list.innerHTML = "";
      
      let count = 0;
      snapshot.forEach(doc => {
        const u = doc.data();
        if (u.phone !== currentUser.phone) {
          count++;
          list.innerHTML += `
            <div class="user-card" onclick="openPrivateChat('${u.name || u.phone}', '${u.phone}')">
              <div>
                <span class="u-name">${u.name || 'User'}</span>
                <div style="font-size:12px; color:#64748b; margin-top:2px;">${u.phone}</div>
              </div>
              <span style="color:#00e676; font-size:13px; font-weight:600;">Chat</span>
            </div>
          `;
        }
      });

      if (count === 0) {
        list.innerHTML = `<p style="color:#64748b; font-size:13px; text-align:center; margin-top:20px;">No recent contacts found. Use the box above to start a chat.</p>`;
      }
    });
  }

  function openPrivateChat(partnerName, partnerPhone) {
    const sorted = [currentUser.phone, partnerPhone].sort();
    activeRoomId = `room_${sorted[0]}_${sorted[1]}`;
    document.getElementById("chat-with-title").innerText = partnerName;
    
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("chat-screen").classList.add("active");
    document.getElementById("bottom-nav").style.display = "none";
    loadMessages();
  }

  function startVideoCall() {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("call-screen").classList.add("active");
    
    const container = document.getElementById("call-frame-container");
    container.innerHTML = `<iframe src="https://meet.jit.si/ZoyiieSecureCall_${activeRoomId}" allow="camera; microphone; fullscreen; display-capture" style="width:100%; height:100%; border:none;"></iframe>`;
  }

  function endVideoCall() {
    document.getElementById("call-frame-container").innerHTML = "";
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("chat-screen").classList.add("active");
  }

  function loadMessages() {
    if (!db || !activeRoomId) return;
    db.collection("rooms").doc(activeRoomId).collection("messages")
      .orderBy("timestamp", "asc")
      .onSnapshot(snapshot => {
        const box = document.getElementById("chat-box");
        if (!box) return;
        box.innerHTML = "";
        snapshot.forEach(doc => {
          const m = doc.data();
          const isMe = m.senderPhone === currentUser.phone;
          box.innerHTML += `
            <div class="msg-card ${isMe ? 'sent' : 'received'}">
              <div>${m.text}</div>
            </div>
          `;
        });
        box.scrollTop = box.scrollHeight;
      });
  }

  function sendTextMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text || !activeRoomId || !db) return;

    db.collection("rooms").doc(activeRoomId).collection("messages").add({
      senderName: currentUser.name,
      senderPhone: currentUser.phone,
      text: text,
      timestamp: Date.now()
    }).then(() => {
      input.value = "";
    });
  }

  function clearFullChat() {
    if (!db || !activeRoomId) return;
    if (confirm("Clear chat?")) {
      db.collection("rooms").doc(activeRoomId).collection("messages").get()
        .then(snap => snap.forEach(d => d.ref.delete()));
    }
  }

  function uploadStatusImage(event) {
    const file = event.target.files[0];
    if (!file || !db) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      db.collection("statuses").add({
        userName: currentUser.name,
        userPhone: currentUser.phone,
        imageUrl: e.target.result,
        createdAt: Date.now()
      }).then(() => {
        alert("Status uploaded successfully!");
        loadStatuses();
      }).catch(err => {
        alert("Status upload failed: " + err.message);
      });
    };
    reader.readAsDataURL(file);
  }

  function loadStatuses() {
    if (!db) return;
    db.collection("statuses").orderBy("createdAt", "desc").onSnapshot(snapshot => {
      const statusList = document.getElementById("status-list");
      if (!statusList) return;
      statusList.innerHTML = "";

      if (snapshot.empty) {
        statusList.innerHTML = `<p style="color:#64748b; text-align:center; margin-top:20px;">No status updates yet.</p>`;
        return;
      }

      snapshot.forEach(doc => {
        const s = doc.data();
        const timeAgo = Math.floor((Date.now() - s.createdAt) / 60000);
        statusList.innerHTML += `
          <div class="status-card" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <div style="display:flex; justify-content:space-between; width:100%;">
              <span class="u-name">${s.userName}</span>
              <span style="color:#64748b; font-size:12px;">${timeAgo < 1 ? 'Just now' : timeAgo + 'm ago'}</span>
            </div>
            <img src="${s.imageUrl}" style="width:100%; max-height:250px; object-fit:cover; border-radius:12px;" />
          </div>
        `;
      });
    });
  }
</script>
</body>
  </html>
